name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Build Vite frontend
        run: npx vite build

      - name: Build Electron app
        run: npx electron-builder --win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify build output
        run: |
          if (-not (Test-Path "release/*.exe")) {
            Write-Error "Build failed: no .exe found in release/"
            exit 1
          }
          Get-ChildItem release/*.exe | ForEach-Object { Write-Host "Built: $($_.Name) ($([math]::Round($_.Length / 1MB, 1)) MB)" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: minimaldoro-installer
          path: release/*.exe
          retention-days: 30

      - name: Delete old release assets
        run: |
          gh release view ${{ github.ref_name }} --json assets -q '.assets[] | select(.name | endswith(".exe")) | .name' | while read -r name; do
            gh release delete-asset ${{ github.ref_name }} "$name" -y
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
